version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aicalling
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # PgBouncer — connection pooler to prevent DB connection exhaustion at scale.
  # All app services should connect to port 5433 (pgbouncer) not 5432 (postgres) directly.
  pgbouncer:
    image: edoburu/pgbouncer
    environment:
      DB_USER: user
      DB_PASSWORD: password
      DB_HOST: postgres
      DB_NAME: aicalling
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      SERVER_RESET_QUERY: DISCARD ALL
      AUTH_TYPE: scram-sha-256
    ports:
      - "5433:5432"
    depends_on:
      - postgres

  redis:
    image: redis:7
    # maxmemory: prevent unbounded growth — LRU eviction drops oldest completed jobs
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  asterisk:
    image: andrius/asterisk
    ports:
      - "5060:5060/udp"
      - "8088:8088/tcp"
    volumes:
      - ./recordings:/var/spool/asterisk/monitor
      - ./asterisk-config:/etc/asterisk

  # ── Application services added in Phase 5 ──────────────────────────────────
  api-service:
    build: ./api-service
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/aicalling
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on: [postgres, redis]

  telephony-gateway:
    build: ./telephony-gateway
    ports: ["3001-3002:3001"]
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/aicalling
      REDIS_URL: redis://redis:6379
      PORT: "3001"
    env_file:
      - .env
    deploy:
      replicas: 2
    depends_on: [postgres, redis]

  call-worker:
    build: ./call-worker
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/aicalling
      REDIS_URL: redis://redis:6379
      MAX_CALLS_PER_TENANT: "5"
    env_file:
      - .env
    deploy:
      replicas: 3
    depends_on: [postgres, redis]

  call-evaluation-api:
    build: ./call-evaluation-service
    command: npm run start:api
    ports: ["4000:4000"]
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/aicalling
      REDIS_URL: redis://redis:6379
      PORT: "4000"
    env_file:
      - .env
    depends_on: [postgres, redis]

  call-evaluation-worker:
    build: ./call-evaluation-service
    command: npm run start:workers
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/aicalling
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    deploy:
      replicas: 2
    depends_on: [postgres, redis]

  # ── API Gateway (NGINX) ────────────────────────────────────────────────────
  # Unifies the REST API (port 3000) and Telephony WebSocket (port 3001) 
  # behind a single port (8080) so ngrok only needs one tunnel.
  api-gateway:
    image: nginx:alpine
    ports: ["8080:8080"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [api-service, telephony-gateway]

volumes:
  pgdata:
  redisdata:
