events {}
http {
    # Use Docker's internal DNS so nginx re-resolves service names dynamically
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    server {
        listen 8080;

        # Reflect the request origin for CORS preflight responses
        set $cors_origin $http_origin;
        if ($cors_origin = '') { set $cors_origin '*'; }

        # Route Twilio WebSocket streams to the telephony gateway
        location /streams {
            set $telephony_upstream http://telephony-gateway:3001;
            proxy_pass $telephony_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Route Evaluation API traffic
        location ~ ^/(reports|debug|admin) {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, ngrok-skip-browser-warning" always;
                add_header Access-Control-Allow-Credentials true always;
                return 204;
            }
            set $eval_upstream http://call-evaluation-api:4000;
            proxy_pass $eval_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # CORS headers are set by the upstream service — no duplicates here
        }

        # Route all other API traffic to the main REST API service
        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, ngrok-skip-browser-warning" always;
                add_header Access-Control-Allow-Credentials true always;
                return 204;
            }
            set $api_upstream http://api-service:3000;
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # CORS headers are set by the upstream service — no duplicates here
        }
    }
}
